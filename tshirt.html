<!DOCTYPE html>
<html>

<head>

<title>Zaidyy Clothing - T-Shirts</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:black;
color:white;
text-align:center;
padding:40px;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding:40px;
}

.card{
background:white;
width:250px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
overflow:hidden;
text-align:center;
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.price{
color:green;
font-size:20px;
}

button{
background:black;
color:white;
border:none;
padding:10px;
margin:10px;
width:90%;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h1>Zaidyy Clothing</h1>

<p>T-Shirt Collection</p>

</header>

<section class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<h3>Black T-Shirt</h3>
<p class="price">₹499</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1523381294911-8d3cead13475">
<h3>White T-Shirt</h3>
<p class="price">₹549</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
<h3>Street T-Shirt</h3>
<p class="price">₹599</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
<h3>Oversize T-Shirt</h3>
<p class="price">₹699</p>
<button>Buy Now</button>
</div>

</section>

</body>

</html>
