<!DOCTYPE html>
<html>
<head>
<title>Zaidyy Clothing</title>
<style>

body{
font-family: Arial;
margin:0;
background:#f5f5f5;
}

header{
background:black;
color:white;
padding:15px;
text-align:center;
font-size:25px;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.product{
background:white;
width:200px;
margin:10px;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

.product img{
width:100%;
border-radius:10px;
}

button{
background:black;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:green;
}

</style>
</head>

<body>

<header>
Zaidyy Clothing
</header>

<div class="products">

<div class="product">
<img src="tshirt.jpg">
<h3>Black T-Shirt</h3>
<p>₹499</p>
<button>Buy Now</button>
</div>

<div class="product">
<img src="hoodie.jpg">
<h3>White Hoodie</h3>
<p>₹899</p>
<button>Buy Now</button>
</div>

<div class="product">
<img src="shirt.jpg">
<h3>Blue Shirt</h3>
<p>₹699</p>
<button>Buy Now</button>
</div>

</div>

</body>
</html>
