<!DOCTYPE html>
<html>
<head>
<title>Zaidyy Clothing</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f2f2f2;
}

header{
background:black;
color:white;
text-align:center;
padding:20px;
font-size:28px;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.product{
background:white;
width:220px;
margin:15px;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

.product img{
width:100%;
border-radius:10px;
}

button{
background:black;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:green;
}

#cart{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
}

</style>

</head>

<body>

<header>
Zaidyy Clothing
</header>

<h2 style="text-align:center;">Products</h2>

<div class="products">

<div class="product">
<img src="tshirt.jpg">
<h3>Black T-Shirt</h3>
<p>₹499</p>
<button onclick="addToCart('Black T-Shirt',499)">Add to Cart</button>
</div>

<div class="product">
<img src="hoodie.jpg">
<h3>White Hoodie</h3>
<p>₹899</p>
<button onclick="addToCart('White Hoodie',899)">Add to Cart</button>
</div>

<div class="product">
<img src="shirt.jpg">
<h3>Blue Shirt</h3>
<p>₹699</p>
<button onclick="addToCart('Blue Shirt',699)">Add to Cart</button>
</div>

</div>

<div id="cart">
<h2>Cart</h2>
<ul id="cart-items"></ul>
<p><b>Total: ₹<span id="total">0</span></b></p>
</div>

<script>

let cart = [];
let total = 0;

function addToCart(name,price){

cart.push({name,price});
total += price;

let li = document.createElement("li");
li.innerText = name + " - ₹" + price;

document.getElementById("cart-items").appendChild(li);
document.getElementById("total").innerText = total;

}

</script>

</body>
</html>
