<!DOCTYPE html>
<html>
<head>

<title>Zaidyy Clothing</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

header{
background:black;
color:white;
text-align:center;
padding:40px;
}

header h1{
margin:0;
font-size:40px;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
padding:40px;
}

.card{
background:white;
width:260px;
padding:15px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:green;
font-size:20px;
}

button{
background:black;
color:white;
border:none;
padding:10px 15px;
margin-top:10px;
cursor:pointer;
border-radius:5px;
}

.cart{
background:white;
padding:30px;
margin:30px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

footer{
background:black;
color:white;
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<header>

<h1>Zaidyy Clothing</h1>

<p>Trendy Fashion Store</p>

</header>

<section class="products">

<div class="card">

<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">

<h3>T-Shirt</h3>

<p class="price">₹499</p>

<button onclick="add('T-Shirt',499)">Add to Cart</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">

<h3>Hoodie</h3>

<p class="price">₹999</p>

<button onclick="add('Hoodie',999)">Add to Cart</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1542272604-787c3835535d">

<h3>Jeans</h3>

<p class="price">₹1299</p>

<button onclick="add('Jeans',1299)">Add to Cart</button>

</div>

</section>

<section class="cart">

<h2>Your Cart</h2>

<p id="items">No items</p>

<h3>Total: ₹<span id="total">0</span></h3>

<h2>Checkout</h2>

<input placeholder="Your Name">

<input placeholder="Phone Number">

<input placeholder="Address">

<button onclick="order()">Place Order</button>

</section>

<footer>

<p>© 2026 Zaidyy Clothing</p>

</footer>

<script>

let cart=[]
let total=0

function add(name,price){

cart.push(name)

total+=price

document.getElementById("items").innerText=cart.join(", ")

document.getElementById("total").innerText=total

}

function order(){

alert("Order Placed Successfully!")

}

</script>

</body>

</html>
