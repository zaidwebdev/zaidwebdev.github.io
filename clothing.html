<!DOCTYPE html>
<html>
<head>
<title>Zaidyy Clothing</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
}

header{
background:black;
color:white;
padding:15px;
font-size:24px;
}

.products{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
flex-wrap:wrap;
}

.product{
background:white;
padding:15px;
border-radius:10px;
width:200px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.product img{
width:100%;
border-radius:10px;
}

button{
background:black;
color:white;
border:none;
padding:8px 12px;
margin-top:5px;
cursor:pointer;
}

.cart{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
}

</style>
</head>

<body>

<header>Zaidyy Clothing</header>

<h2>Products</h2>

<div class="products">

<div class="product">
<img src="https://picsum.photos/200?1">
<h3>Black T-Shirt</h3>
<p>₹499</p>
<button onclick="addToCart('Black T-Shirt',499)">Add to Cart</button>
</div>

<div class="product">
<img src="https://picsum.photos/200?2">
<h3>White Hoodie</h3>
<p>₹899</p>
<button onclick="addToCart('White Hoodie',899)">Add to Cart</button>
</div>

<div class="product">
<img src="https://picsum.photos/200?3">
<h3>Blue Shirt</h3>
<p>₹699</p>
<button onclick="addToCart('Blue Shirt',699)">Add to Cart</button>
</div>

<div class="product">
<img src="https://picsum.photos/200?4">
<h3>Red Hoodie</h3>
<p>₹999</p>
<button onclick="addToCart('Red Hoodie',999)">Add to Cart</button>
</div>

</div>

<div class="cart">

<h2>Cart</h2>

<ul id="cart-items"></ul>

<h3>Total: ₹<span id="total">0</span></h3>

<button onclick="clearCart()">Clear Cart</button>

</div>

<script>

let total = 0;

function addToCart(name,price){

let cart = document.getElementById("cart-items");

let li = document.createElement("li");

li.innerText = name + " - ₹" + price;

cart.appendChild(li);

total += price;

document.getElementById("total").innerText = total;

}

function clearCart(){

document.getElementById("cart-items").innerHTML="";

total = 0;

document.getElementById("total").innerText = total;

}

</script>

</body>
</html>
