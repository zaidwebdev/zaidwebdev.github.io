<!DOCTYPE html>
<html>

<head>

<title>Zaidyy Clothing</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:black;
color:white;
text-align:center;
padding:50px;
}

header h1{
margin:0;
font-size:40px;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding:40px;
}

.card{
background:white;
width:260px;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card h3{
padding:10px;
}

.price{
color:green;
font-size:20px;
padding:0 10px;
}

button{
margin:10px;
padding:10px;
width:90%;
border:none;
background:black;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#333;
}

.cart{
background:white;
margin:30px;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

footer{
background:black;
color:white;
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<header>

<h1>Zaidyy Clothing</h1>

<p>Premium Fashion Store</p>

</header>

<section class="products">

<div class="card">

<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">

<h3>Classic T-Shirt</h3>

<p class="price">₹499</p>

<button onclick="add('Classic T-Shirt',499)">Add to Cart</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">

<h3>Stylish Hoodie</h3>

<p class="price">₹999</p>

<button onclick="add('Stylish Hoodie',999)">Add to Cart</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1542272604-787c3835535d">

<h3>Blue Jeans</h3>

<p class="price">₹1299</p>

<button onclick="add('Blue Jeans',1299)">Add to Cart</button>

</div>

</section>

<section class="cart">

<h2>Your Cart</h2>

<p id="items">No items added</p>

<h3>Total: ₹<span id="total">0</span></h3>

<h2>Checkout</h2>

<input placeholder="Full Name">

<input placeholder="Phone Number">

<input placeholder="Delivery Address">

<button onclick="order()">Place Order</button>

</section>

<footer>

<p>© 2026 Zaidyy Clothing</p>

</footer>

<script>

let cart=[]
let total=0

function add(name,price){

cart.push(name)

total+=price

document.getElementById("items").innerText=cart.join(", ")

document.getElementById("total").innerText=total

}

function order(){

alert("Order placed successfully!")

}

</script>

</body>

</html>
