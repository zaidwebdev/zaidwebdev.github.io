<!DOCTYPE html>
<html>
<head>
<title>Zaidyy Clothing</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f2f2f2;
}

header{
background:black;
color:white;
text-align:center;
padding:20px;
font-size:28px;
}

.container{
padding:20px;
}

.products{
display:flex;
flex-wrap:wrap;
gap:20px;
}

.product{
background:white;
padding:10px;
width:200px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

.product img{
width:100%;
border-radius:10px;
}

button{
background:black;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:green;
}

.admin{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

input{
padding:8px;
margin:5px;
}

</style>

</head>

<body>

<header>
Zaidyy Clothing
</header>

<div class="container">

<div class="admin">
<h3>Add Product (Owner)</h3>

<input id="name" placeholder="Product name">

<input id="price" placeholder="Price">

<input id="image" placeholder="Image URL">

<button onclick="addProduct()">Add Product</button>

</div>

<div class="products" id="product-list"></div>

</div>

<script>

let products = [];

function addProduct(){

let name = document.getElementById("name").value;
let price = document.getElementById("price").value;
let image = document.getElementById("image").value;

let product = {name,price,image};

products.push(product);

showProducts();

}

function showProducts(){

let list = document.getElementById("product-list");

list.innerHTML = "";

products.forEach(p => {

list.innerHTML += `
<div class="product">

<img src="${p.image}">

<h3>${p.name}</h3>

<p>₹${p.price}</p>

<button>Add to Cart</button>

</div>
`;

});

}

</script>

</body>
</html>
