<!DOCTYPE html>
<html>
<head>
<title>Zaidyy Cloth</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:black;
color:white;
text-align:center;
padding:40px;
}

header h1{
margin:0;
font-size:35px;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:40px;
}

.card{
background:white;
width:250px;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:10px;
}

.price{
font-size:20px;
color:#27ae60;
}

button{
background:#25D366;
border:none;
padding:10px 20px;
color:white;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1ebe5d;
}

footer{
background:black;
color:white;
text-align:center;
padding:20px;
}

</style>
</head>

<body>

<header>
<h1>Zaidyy Cloth</h1>
<p>Trendy Fashion For Everyone</p>
</header>

<section class="products">

<div class="card">
<img src="https://via.placeholder.com/250">
<h3>Stylish T-Shirt</h3>
<p class="price">₹499</p>
<button onclick="order()">Order on WhatsApp</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/250">
<h3>Modern Hoodie</h3>
<p class="price">₹999</p>
<button onclick="order()">Order on WhatsApp</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/250">
<h3>Blue Jeans</h3>
<p class="price">₹1299</p>
<button onclick="order()">Order on WhatsApp</button>
</div>

</section>

<footer>
<p>© 2026 Zaidyy Cloth</p>
</footer>

<script>
function order(){
window.open("https://wa.me/917620245922");
}
</script>

</body>
</html>
